name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check src tests
      - run: python -m pytest -q
      - run: python -m oncall_alert_correlation_engine.cli correlate examples/noisy_alerts.json --catalog examples/service_catalog.json --json-out reports/latest/correlation_report.json --markdown-out reports/latest/correlation_report.md --metrics-out reports/latest/metrics.prom

